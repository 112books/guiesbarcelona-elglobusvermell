title   = "Guies de Barcelona de El Globus Vermell"
theme   = "guiesbcn-elglobusvermell"
enableRobotsTXT = true
disableHugoGeneratorInject = true
summaryLength   = 70

defaultContentLanguage        = "ca"
defaultContentLanguageInSubdir = false

[sitemap]
  filename = "sitemap.xml"

[outputs]
  home    = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

# ── Idiomes ──────────────────────────────────────────────────────────────────
# Nomes català actiu ara. Anglès/castellà preparats, desactivats fins que calgui.

[languages]

  [languages.ca]
    contentDir = "content/ca"
    label      = "Català"
    locale     = "ca"
    weight     = 1
    title      = "Guies de Barcelona de El Globus Vermell"
    [languages.ca.params]
      description = "Guies de Barcelona d'El Globus Vermell."
      ogLocale    = "ca_ES"

  [languages.en]
    contentDir = "content/en"
    label      = "English"
    locale     = "en"
    weight     = 2
    disabled   = true
    title      = "Barcelona Guides — El Globus Vermell"
    [languages.en.params]
      description = "Barcelona guides by El Globus Vermell."
      ogLocale    = "en_GB"

  [languages.es]
    contentDir = "content/es"
    label      = "Castellano"
    locale     = "es"
    weight     = 3
    disabled   = true
    title      = "Guías Barcelona — El Globus Vermell"
    [languages.es.params]
      description = "Guías de Barcelona de El Globus Vermell."
      ogLocale    = "es_ES"

# ── Paràmetres globals ────────────────────────────────────────────────────────

[params]
  logoImg        = "img/Arquitectura-i-urbanisme-de-barcelona.svg"
  logoCompact    = "img/Arquitectura-i-urbanisme-de-barcelona-quadrat.svg"
  logoText       = "El Globus Vermell"
  defaultOgImage = ""
  # GoatCounter: afegir URL al fitxer d'entorn (production/hugo.toml o secrets)
  # Exemple: gc_url = "https://guiesbarcelona.goatcounter.com"
  gc_url         = "https://guiesbarcelona.goatcounter.com"

[taxonomies]
  publicacio = "publicacions"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[minify]
  disableCSS  = false
  disableHTML = false
  disableJS   = false

# ── Menú (buit de moment, afegir entrades quan hi hagi seccions) ─────────────

[[languages.ca.menus.main]]
  name   = "Mapa"
  url    = "/"
  weight = 1

[[languages.ca.menus.main]]
  name   = "Presentació"
  url    = "/presentacio/"
  weight = 2

[[languages.ca.menus.main]]
  name   = "En paper"
  url    = "/en-paper/"
  weight = 3

[[languages.ca.menus.main]]
  name   = "Crèdits"
  url    = "/credits/"
  weight = 4
