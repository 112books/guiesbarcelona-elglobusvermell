name: Deploy → Staging (GitHub Pages)

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages-staging"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Hugo
        run: |
          wget -q https://github.com/gohugoio/hugo/releases/download/v0.159.0/hugo_extended_0.159.0_linux-amd64.tar.gz
          tar -xzf hugo_extended_0.159.0_linux-amd64.tar.gz
          sudo mv hugo /usr/local/bin/

      - name: Build Hugo (staging, amb drafts)
        run: |
          hugo --minify \
               --baseURL "https://112books.github.io/guiesbarcelona-elglobusvermell/" \
               --buildDrafts

      - name: Deploy to GitHub Pages (branca gh-pages-staging)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages-staging
