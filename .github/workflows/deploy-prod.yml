name: Deploy → Producció (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Hugo
        run: |
          wget -q https://github.com/gohugoio/hugo/releases/download/v0.159.0/hugo_extended_0.159.0_linux-amd64.tar.gz
          tar -xzf hugo_extended_0.159.0_linux-amd64.tar.gz
          sudo mv hugo /usr/local/bin/

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install staticrypt
        run: npm install staticrypt

      # TODO: canviar baseURL a "https://guiesbarcelona.elglobusvermell.org/" quan el domini propi estigui configurat a Pages.
      - name: Build Hugo
        run: hugo --minify --baseURL "https://112books.github.io/guiesbarcelona-elglobusvermell/"

      - name: Protect with staticrypt
        run: |
          shopt -s globstar
          html_files=(public/**/*.html)
          if [ ${#html_files[@]} -gt 0 ]; then
            npx staticrypt "${html_files[@]}" \
              --password "${{ secrets.SITE_PASSWORD }}" \
              --config .staticrypt.json \
              --directory public
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
