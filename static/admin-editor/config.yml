# Sveltia CMS — Guies Barcelona
# Accés El Globus Vermell: edificis i pàgines de contingut
#
# Autenticació: PAT (Personal Access Token) de GitHub
#   Permisos: "Contents: Read and write" + "Metadata: Read"
#   Repositori: 112books/guiesbarcelona-elglobusvermell

backend:
  name: github
  repo: 112books/guiesbarcelona-elglobusvermell
  branch: main

media_folder: static/img/edificis
public_folder: /img/edificis

locale: ca
logo_url: /img/Arquitectura-i-urbanisme-de-barcelona.svg
site_url: /

collections:

  # ══════════════════════════════════════════════════════════════════════════
  # EDIFICIS — agrupats per publicació
  # ══════════════════════════════════════════════════════════════════════════
  - name: elements
    label: "Edificis i elements"
    label_singular: Edifici
    folder: content/ca/elements
    create: false
    extension: md
    format: yaml-frontmatter
    slug: "{{slug}}"
    summary: "{{title}}"
    sortable_fields: [title, any, adreca]
    view_groups:
      - label: "GATCPAC · 1928-1939"
        field: publicacions
        pattern: gatcpac
      - label: "Arquitectura Moderna · 1950-1975"
        field: publicacions
        pattern: 50-75
      - label: "De l'esperança a la crisi · 1975-2008"
        field: publicacions
        pattern: 76-08
      - label: "La revolució tranquil·la · 2010-2025"
        field: publicacions
        pattern: 09-25
      - label: "Jardins interiors d'illa"
        field: publicacions
        pattern: interiors-illa
      - label: "Patrimoni industrial del Poblenou"
        field: publicacions
        pattern: poblenou
      - label: "Mercats de Barcelona"
        field: publicacions
        pattern: mercats
      - label: "Biblioteques de Barcelona"
        field: publicacions
        pattern: biblioteques
      - label: "La Barceloneta"
        field: publicacions
        pattern: barceloneta
      - label: "La Marina"
        field: publicacions
        pattern: marina
      - label: "Masies de Barcelona"
        field: publicacions
        pattern: masies
      - label: "La Barcelona de Tàpies"
        field: publicacions
        pattern: tapies
      - label: "New Babylon Barcelona"
        field: publicacions
        pattern: new-babylon
    view_filters:
      - label: Publicats
        field: draft
        pattern: false
      - label: Esborranys
        field: draft
        pattern: true
    fields:
      - label: Títol
        name: title
        widget: string
        hint: "Nom oficial de l'edifici o element"

      - label: Esborrany
        name: draft
        widget: boolean
        default: false
        hint: "Si està activat, l'element no apareix al web"

      - label: Publicacions
        name: publicacions
        widget: select
        multiple: true
        required: false
        hint: "Guia(es) on apareix aquest edifici"
        options:
          - label: "GATCPAC. Arquitectura d'avantguarda 1928-1939"
            value: gatcpac
          - label: "Arquitectura Moderna 1950-1975"
            value: 50-75
          - label: "De l'esperança a la crisi 1975-2008"
            value: 76-08
          - label: "La revolució tranquil·la 2010-2025"
            value: 09-25
          - label: "Jardins interiors d'illa de l'Eixample"
            value: interiors-illa
          - label: "Patrimoni industrial del Poblenou"
            value: poblenou
          - label: "Mercats de Barcelona"
            value: mercats
          - label: "Biblioteques de Barcelona"
            value: biblioteques
          - label: "La Barceloneta"
            value: barceloneta
          - label: "La Marina del Port i del Prat Vermell"
            value: marina
          - label: "Masies de Barcelona"
            value: masies
          - label: "La Barcelona de Tàpies"
            value: tapies
          - label: "New Babylon Barcelona"
            value: new-babylon

      - label: Temes transversals
        name: temes_transversals
        widget: select
        multiple: true
        required: false
        hint: "Categories temàtiques que creuen diverses publicacions"
        options:
          - label: Espai públic
            value: espai-public
          - label: Art públic
            value: art-public
          - label: Dones arquitectes
            value: dones-arquitectes
          - label: Nomenclàtor femení
            value: nomenclator-femeni

      - label: Adreça
        name: adreca
        widget: string
        required: false
        hint: "Adreça postal (p.ex. Carrer de Provença, 261)"

      - label: Any de construcció
        name: any
        widget: string
        required: false
        hint: "Any o període (p.ex. 1934 o c. 1930 o 1928-1931)"

      - label: Arquitectes
        name: arquitectes
        widget: list
        required: false
        hint: "Un nom per línia"

      - label: Tipologia
        name: tipologia
        widget: string
        required: false
        hint: "Ex: Habitatge col·lectiu, Equipament cultural, Espai públic..."

      - label: Nivell de protecció
        name: proteccio
        widget: select
        required: false
        hint: "Catàleg del Patrimoni Arquitectònic de Barcelona"
        options:
          - label: "A — Bé Cultural d'Interès Nacional (BCIN)"
            value: A
          - label: "B — Bé Cultural d'Interès Local (BCIL)"
            value: B
          - label: "C — Bé d'Interès Urbanístic"
            value: C
          - label: "D — Bé d'Interès Documental"
            value: D

      - label: "Superfície (m²)"
        name: superficie
        widget: number
        required: false
        value_type: int

      - label: Anys de reforma
        name: anys_reforma
        widget: list
        required: false
        hint: "Un any per línia (p.ex. 1998)"

      - label: Premis
        name: premis
        widget: list
        required: false
        hint: "Un premi per línia"

      - label: Latitud
        name: lat
        widget: number
        required: false
        value_type: float
        step: 0.000001
        hint: "Coordenada GPS (p.ex. 41.3851) — necessària per aparèixer al mapa"

      - label: Longitud
        name: long
        widget: number
        required: false
        value_type: float
        step: 0.000001
        hint: "Coordenada GPS (p.ex. 2.1734) — necessària per aparèixer al mapa"

      - label: Descripció
        name: descripcio
        widget: text
        required: false
        hint: "Text descriptiu que apareix a la fitxa de l'edifici"

      - label: Text nomenclàtor femení
        name: descripcio_nomenclator
        widget: text
        required: false
        hint: "Només per a elements de la categoria Nomenclàtor femení"

      - label: Contingut addicional
        name: body
        widget: markdown
        required: false
        hint: "Text enriquit addicional (opcional)"

  # ══════════════════════════════════════════════════════════════════════════
  # PÀGINES DE CONTINGUT
  # ══════════════════════════════════════════════════════════════════════════
  - name: pagines
    label: "Pàgines del web"
    files:
      - label: "Presentació (pàgina principal)"
        name: presentacio
        file: content/ca/_index.md
        fields:
          - { label: Títol, name: title, widget: string }
          - { label: Contingut, name: body, widget: markdown }

      - label: "En paper (publicacions físiques)"
        name: en-paper
        file: content/ca/en-paper/_index.md
        fields:
          - { label: Títol, name: title, widget: string }
          - { label: Contingut, name: body, widget: markdown }

      - label: "Crèdits"
        name: credits
        file: content/ca/credits/_index.md
        fields:
          - { label: Títol, name: title, widget: string }
          - { label: Contingut, name: body, widget: markdown }
