# Sveltia CMS — Guies Barcelona (El Globus Vermell)
# Accés editors: El Globus Vermell — només fitxes d'edificis
#
# Els editors NO poden modificar configuració (publicacions, temes, pàgines).
#
# Autenticació: PAT de GitHub (fine-grained)
#   Permisos: "Contents: Read and write" + "Metadata: Read"
#   Repositori: 112books/guiesbarcelona-elglobusvermell

backend:
  name: github
  repo: 112books/guiesbarcelona-elglobusvermell
  branch: main

media_folder: static/img/edificis
public_folder: /img/edificis

locale: ca

collections:

  - name: elements
    label: Edificis i elements
    label_singular: Edifici
    folder: content/ca/elements
    create: true
    extension: md
    format: yaml-frontmatter
    slug: "{{slug}}"
    summary: "{{title}} — {{publicacions}}"
    sortable_fields: [title, any]
    view_filters:
      - label: Publicats
        field: draft
        pattern: false
      - label: Esborranys
        field: draft
        pattern: true
    fields:
      - label: Títol
        name: title
        widget: string

      - label: Esborrany
        name: draft
        widget: boolean
        default: false

      - label: Publicacions
        name: publicacions
        widget: select
        multiple: true
        required: false
        options:
          - label: "GATCPAC. Arquitectura d'avantguarda 1928-1939"
            value: gatcpac
          - label: "Arquitectura Moderna 1950-1975"
            value: 50-75
          - label: "De l'esperança a la crisi 1975-2008"
            value: 76-08
          - label: "La revolució tranquil·la 2010-2025"
            value: 09-25
          - label: "Jardins interiors d'illa de l'Eixample"
            value: interiors-illa
          - label: "Patrimoni industrial del Poblenou"
            value: poblenou
          - label: "Mercats de Barcelona"
            value: mercats
          - label: "Biblioteques de Barcelona"
            value: biblioteques
          - label: "La Barceloneta"
            value: barceloneta
          - label: "La Marina del Port i del Prat Vermell"
            value: marina
          - label: "Masies de Barcelona"
            value: masies
          - label: "La Barcelona de Tàpies"
            value: tapies
          - label: "New Babylon Barcelona"
            value: new-babylon

      - label: Temes transversals
        name: temes_transversals
        widget: select
        multiple: true
        required: false
        options:
          - label: Espai públic
            value: espai-public
          - label: Art públic
            value: art-public
          - label: Dones arquitectes
            value: dones-arquitectes
          - label: Nomenclàtor femení
            value: nomenclator-femeni

      - label: Adreça
        name: adreca
        widget: string
        required: false

      - label: Any
        name: any
        widget: string
        required: false
        hint: "Any de construcció (p.ex. 1934 o c. 1930)"

      - label: Arquitectes
        name: arquitectes
        widget: list
        required: false

      - label: Tipologia
        name: tipologia
        widget: string
        required: false

      - label: Protecció
        name: proteccio
        widget: select
        required: false
        options:
          - label: "A — Bé Cultural d'Interès Nacional"
            value: A
          - label: "B — Bé Cultural d'Interès Local"
            value: B
          - label: "C — Bé d'Interès Urbanístic"
            value: C
          - label: "D — Bé d'Interès Documental"
            value: D

      - label: "Superfície (m²)"
        name: superficie
        widget: number
        required: false
        value_type: int

      - label: Anys de reforma
        name: anys_reforma
        widget: list
        required: false

      - label: Premis
        name: premis
        widget: list
        required: false

      - label: Latitud
        name: lat
        widget: number
        required: false
        value_type: float
        step: 0.000001

      - label: Longitud
        name: long
        widget: number
        required: false
        value_type: float
        step: 0.000001

      - label: Descripció
        name: descripcio
        widget: text
        required: false

      - label: Nomenclàtor
        name: descripcio_nomenclator
        widget: text
        required: false

      - label: Contingut addicional (markdown)
        name: body
        widget: markdown
        required: false
