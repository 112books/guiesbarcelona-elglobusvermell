<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editor — Guies Barcelona</title>
  <style>
    .cms-login-ajuda {
      font-family: system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 0.8rem;
      color: #555555;
      margin: 0.3rem 0 1.1rem;
      line-height: 1.45;
      max-width: 300px;
    }
    .cms-login-ajuda strong { color: #111111; }
    .cms-login-ajuda a { color: #c81e1e; text-decoration: none; }
    .cms-login-ajuda a:hover { text-decoration: underline; }
    .cms-login-ajuda.cms-login-desactivat { opacity: 0.55; font-style: italic; }
  </style>
</head>
<body>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  <script>
    var injected = false;
    var observer = new MutationObserver(function () {
      if (injected) return;
      var btns = Array.from(document.querySelectorAll('button'));
      var githubBtn = btns.find(function (b) {
        return b.textContent.trim().toLowerCase().includes('github');
      });
      var tokenBtn = btns.find(function (b) {
        var t = b.textContent.trim().toLowerCase();
        return t.includes('token') || t.includes('access token');
      });
      if (!githubBtn || !tokenBtn) return;
      injected = true;
      observer.disconnect();

      function addInfo(afterEl, html, extra) {
        var p = document.createElement('p');
        p.className = 'cms-login-ajuda' + (extra ? ' ' + extra : '');
        p.innerHTML = html;
        afterEl.parentNode.insertBefore(p, afterEl.nextSibling);
      }

      addInfo(
        githubBtn,
        'Accés via compte de GitHub (OAuth). <strong>Pendent de configuració.</strong> De moment, utilitza el token personal.',
        'cms-login-desactivat'
      );
      addInfo(
        tokenBtn,
        'Mètode actiu. El teu token personal (PAT) t\'ha de ser facilitat per l\'administrador, ' +
        'o genera\'l tu a ' +
        '<a href="https://github.com/settings/personal-access-tokens/new" target="_blank" rel="noopener">GitHub → Settings → Fine-grained tokens</a>. ' +
        'Permisos: <strong>Contents</strong> (lectura i escriptura) + <strong>Metadata</strong> (lectura).'
      );
    });
    observer.observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
