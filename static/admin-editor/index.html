<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editor — Guies Barcelona</title>
  <style>
    body { background: #f5f4f0; }

    .cms-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding-bottom: 1.5rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid #e5e5e5;
    }
    .cms-brand a { display: flex; align-items: center; }
    .cms-brand img { height: 3rem; width: auto; }
    .cms-brand-sub {
      font-family: system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      color: #999;
      margin: 0;
      text-align: center;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .cms-login-ajuda {
      font-family: system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 0.78rem;
      color: #555;
      margin: 0.3rem 0 1rem;
      line-height: 1.5;
      max-width: 300px;
    }
    .cms-login-ajuda strong { color: #111; }
    .cms-login-ajuda a { color: #c81e1e; text-decoration: none; }
    .cms-login-ajuda a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <script>
    (function () {
      var _open = window.open;
      window.open = function (url) {
        var s = String(url || '');
        if (s.includes('netlify.com') || s.includes('github.com/login/oauth')) {
          return null;
        }
        return _open.apply(this, arguments);
      };
    })();
  </script>
  <style>
    .cms-help-btn {
      position: fixed;
      bottom: 1.25rem;
      right: 1.25rem;
      z-index: 9999;
      background: #c81e1e;
      color: #fff;
      border: none;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 50%;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      transition: background 0.2s;
      font-family: system-ui, sans-serif;
    }
    .cms-help-btn:hover { background: #a01818; }
  </style>
  <a href="../admin/guia/" target="_blank" rel="noopener"
     class="cms-help-btn" aria-label="Guia de l'editor">?</a>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  <script>
    var injected = false;
    var observer = new MutationObserver(function () {
      if (injected) return;

      var btns = Array.from(document.querySelectorAll('button'));
      if (!btns.length) return;

      function isPAT(b) {
        var t = (b.textContent + ' ' + b.getAttribute('aria-label') + ' ' + b.className)
                  .toLowerCase();
        return t.includes('token') || t.includes('access') || t.includes('pat');
      }

      var tokenBtn = btns.find(isPAT);
      if (!tokenBtn) return;

      injected = true;
      observer.disconnect();

      btns.forEach(function (b) {
        if (!isPAT(b)) {
          b.style.display = 'none';
          var wrap = b.parentNode;
          if (wrap && !wrap.contains(tokenBtn)) {
            wrap.style.display = 'none';
          }
        }
      });

      var card = tokenBtn.closest('form') || tokenBtn.parentNode;

      var brand = document.createElement('div');
      brand.className = 'cms-brand';
      brand.innerHTML =
        '<a href="../" aria-label="Inici — Guies de Barcelona">' +
          '<img src="../img/Arquitectura-i-urbanisme-de-barcelona.svg" ' +
               'alt="Guies de Barcelona de El Globus Vermell">' +
        '</a>' +
        '<p class="cms-brand-sub">Editor de continguts</p>';
      card.insertBefore(brand, card.firstChild);

      var info = document.createElement('p');
      info.className = 'cms-login-ajuda';
      info.innerHTML =
        'Introdueix el teu <strong>token personal (PAT)</strong> de GitHub. ' +
        'Genera\'l a <a href="https://github.com/settings/personal-access-tokens/new" ' +
        'target="_blank" rel="noopener">GitHub → Settings → Fine-grained tokens</a>. ' +
        'Permisos: <strong>Contents</strong> (lectura i escriptura) + ' +
        '<strong>Metadata</strong> (lectura).';
      tokenBtn.parentNode.insertBefore(info, tokenBtn.nextSibling);
    });
    observer.observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
