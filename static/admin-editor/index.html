<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editor — Guies Barcelona</title>
  <style>
    body { background: #f5f4f0; }

    .cms-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding-bottom: 1.5rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid #e5e5e5;
    }
    .cms-brand a { display: flex; align-items: center; }
    .cms-brand img { height: 3rem; width: auto; }
    .cms-brand-sub {
      font-family: system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 0.8rem;
      color: #888;
      margin: 0;
      text-align: center;
    }

    .cms-login-ajuda {
      font-family: system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 0.78rem;
      color: #555;
      margin: 0.25rem 0 1rem;
      line-height: 1.45;
      max-width: 300px;
    }
    .cms-login-ajuda strong { color: #111; }
    .cms-login-ajuda a { color: #c81e1e; text-decoration: none; }
    .cms-login-ajuda a:hover { text-decoration: underline; }
    .cms-login-desactivat { opacity: 0.5; font-style: italic; }
  </style>
</head>
<body>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  <script>
    var injected = false;
    var observer = new MutationObserver(function () {
      if (injected) return;
      var btns = Array.from(document.querySelectorAll('button'));
      var githubBtn = btns.find(function (b) {
        return b.textContent.trim().toLowerCase().includes('github');
      });
      var tokenBtn = btns.find(function (b) {
        var t = b.textContent.trim().toLowerCase();
        return t.includes('token') || t.includes('access token');
      });
      if (!githubBtn || !tokenBtn) return;
      injected = true;
      observer.disconnect();

      var card = githubBtn.parentNode;

      // ── Capçalera de marca ──────────────────────────────────────────────
      var brand = document.createElement('div');
      brand.className = 'cms-brand';
      brand.innerHTML =
        '<a href="../" aria-label="Inici — Guies de Barcelona">' +
          '<img src="../img/Arquitectura-i-urbanisme-de-barcelona.svg" ' +
               'alt="Guies de Barcelona de El Globus Vermell">' +
        '</a>' +
        '<p class="cms-brand-sub">Editor de continguts</p>';
      card.insertBefore(brand, card.firstChild);

      // ── Explicacions sota cada botó ─────────────────────────────────────
      function addInfo(after, html, cls) {
        var p = document.createElement('p');
        p.className = 'cms-login-ajuda' + (cls ? ' ' + cls : '');
        p.innerHTML = html;
        after.parentNode.insertBefore(p, after.nextSibling);
      }

      addInfo(
        githubBtn,
        'No disponible fins que el web sigui en producció (requereix servidor OAuth propi).',
        'cms-login-desactivat'
      );
      addInfo(
        tokenBtn,
        'Mètode actiu. El teu <strong>token personal (PAT)</strong> l\'has de generar a ' +
        '<a href="https://github.com/settings/personal-access-tokens/new" target="_blank" rel="noopener">' +
        'GitHub → Settings → Fine-grained tokens</a>. ' +
        'Permisos: <strong>Contents</strong> (lectura i escriptura) + <strong>Metadata</strong> (lectura).'
      );
    });
    observer.observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
