<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CMS — Guies Barcelona</title>
  <style>
    body { background: #f5f4f0; }

    .cms-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding-bottom: 1.5rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid #e5e5e5;
    }
    .cms-brand a { display: flex; align-items: center; }
    .cms-brand img { height: 3rem; width: auto; }
    .cms-brand-sub {
      font-family: system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      color: #999;
      margin: 0;
      text-align: center;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .cms-login-ajuda {
      font-family: system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 0.78rem;
      color: #555;
      margin: 0.3rem 0 1rem;
      line-height: 1.5;
      max-width: 300px;
    }
    .cms-login-ajuda strong { color: #111; }
    .cms-login-ajuda a { color: #c81e1e; text-decoration: none; }
    .cms-login-ajuda a:hover { text-decoration: underline; }

    .cms-peu {
      border-top: 1px solid #e5e5e5;
      margin-top: 1.5rem;
      padding-top: 1rem;
      font-family: system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 0.72rem;
      color: #bbb;
      text-align: center;
      line-height: 1.7;
    }
    .cms-peu a { color: #bbb; text-decoration: none; }
    .cms-peu a:hover { color: #c81e1e; }
    .cms-peu-links {
      display: flex;
      gap: 0.6rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 0.2rem;
    }
    .cms-peu-links a { text-decoration: underline; }
    .cms-peu-back {
      margin-top: 0.75rem;
      font-size: 0.7rem;
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  <script>
    var injected = false;
    var observer = new MutationObserver(function () {
      if (injected) return;

      var btns = Array.from(document.querySelectorAll('button'));
      var githubBtn = btns.find(function (b) {
        return b.textContent.trim().toLowerCase().includes('github');
      });
      var tokenBtn = btns.find(function (b) {
        var t = b.textContent.trim().toLowerCase();
        return t.includes('token') || t.includes('access');
      });
      if (!tokenBtn) return;
      injected = true;
      observer.disconnect();

      // Amaga el botó GitHub OAuth — no funciona fins que el servidor
      // de producció tingui un OAuth App configurat (Fase 1)
      if (githubBtn) {
        var githubWrap = githubBtn.parentNode;
        // Amaga el botó i tot el seu contenidor directe si no conté el tokenBtn
        if (!githubWrap.contains(tokenBtn)) {
          githubWrap.style.display = 'none';
        } else {
          githubBtn.style.display = 'none';
        }
      }

      var card = tokenBtn.closest('form') || tokenBtn.parentNode;

      // ── Capçalera ──────────────────────────────────────────────
      var brand = document.createElement('div');
      brand.className = 'cms-brand';
      brand.innerHTML =
        '<a href="../../" aria-label="Inici — Guies de Barcelona">' +
          '<img src="../../img/Arquitectura-i-urbanisme-de-barcelona.svg" ' +
               'alt="Guies de Barcelona de El Globus Vermell">' +
        '</a>' +
        '<p class="cms-brand-sub">Editor de continguts</p>';
      card.insertBefore(brand, card.firstChild);

      // ── Text explicatiu ────────────────────────────────────────
      var info = document.createElement('p');
      info.className = 'cms-login-ajuda';
      info.innerHTML =
        'Introdueix el teu <strong>token personal (PAT)</strong> de GitHub. ' +
        'Genera\'l a <a href="https://github.com/settings/personal-access-tokens/new" ' +
        'target="_blank" rel="noopener">GitHub → Settings → Fine-grained tokens</a>. ' +
        'Permisos: <strong>Contents</strong> (lectura i escriptura) + ' +
        '<strong>Metadata</strong> (lectura). ' +
        'Repositori: <strong>112books/guiesbarcelona-elglobusvermell</strong>.';
      tokenBtn.parentNode.insertBefore(info, tokenBtn.nextSibling);

      // ── Peu ────────────────────────────────────────────────────
      var peu = document.createElement('div');
      peu.className = 'cms-peu';
      peu.innerHTML =
        '<div>© ' + new Date().getFullYear() + ' ' +
        '<a href="https://elglobusvermell.org" target="_blank" rel="noopener">El Globus Vermell</a>' +
        '</div>' +
        '<div class="cms-peu-links">' +
          '<a href="../../legal/avis-legal/">Avís legal</a>' +
          '<a href="../../legal/privacitat/">Privacitat</a>' +
          '<a href="../../legal/cookies/">Cookies</a>' +
        '</div>' +
        '<div class="cms-peu-back">← <a href="../">Tornar a l\'administrador</a></div>';
      card.appendChild(peu);
    });
    observer.observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
