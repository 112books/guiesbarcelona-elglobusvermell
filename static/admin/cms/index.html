<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CMS — Guies Barcelona</title>
  <style>
    body { background: #f5f4f0; }

    .cms-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding-bottom: 1.5rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid #e5e5e5;
    }
    .cms-brand a { display: flex; align-items: center; }
    .cms-brand img { height: 3rem; width: auto; }
    .cms-brand-sub {
      font-family: system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 0.8rem;
      color: #888;
      margin: 0;
      text-align: center;
    }

    .cms-login-ajuda {
      font-family: system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 0.78rem;
      color: #555;
      margin: 0.25rem 0 1rem;
      line-height: 1.45;
      max-width: 300px;
    }
    .cms-login-ajuda strong { color: #111; }
    .cms-login-ajuda a { color: #c81e1e; text-decoration: none; }
    .cms-login-ajuda a:hover { text-decoration: underline; }
    .cms-login-desactivat { opacity: 0.5; font-style: italic; }

    .cms-peu {
      border-top: 1px solid #e5e5e5;
      margin-top: 1.5rem;
      padding-top: 1rem;
      font-family: system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 0.75rem;
      color: #999;
      text-align: center;
      line-height: 1.6;
    }
    .cms-peu a { color: #999; text-decoration: none; }
    .cms-peu a:hover { color: #c81e1e; }
    .cms-peu-legal {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 0.25rem;
    }
    .cms-peu-legal a { text-decoration: underline; }
    .cms-peu-powered {
      margin-top: 0.5rem;
      font-size: 0.7rem;
      color: #bbb;
    }
    .cms-peu-powered a { color: #bbb; }
    .cms-peu-powered a:hover { color: #c81e1e; }
    .cms-peu-back {
      margin-top: 0.75rem;
      font-size: 0.72rem;
    }
    .cms-peu-back a { color: #bbb; text-decoration: underline; }
    .cms-peu-back a:hover { color: #c81e1e; }

    .cms-peu-cc { display: inline-flex; align-items: center; margin-top: 0.35rem; opacity: 0.7; }
    .cms-peu-cc:hover { opacity: 1; }
  </style>
</head>
<body>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  <script>
    var injected = false;
    var observer = new MutationObserver(function () {
      if (injected) return;
      var btns = Array.from(document.querySelectorAll('button'));
      var githubBtn = btns.find(function (b) {
        return b.textContent.trim().toLowerCase().includes('github');
      });
      var tokenBtn = btns.find(function (b) {
        var t = b.textContent.trim().toLowerCase();
        return t.includes('token') || t.includes('access');
      });
      if (!githubBtn || !tokenBtn) return;
      injected = true;
      observer.disconnect();

      var card = githubBtn.parentNode;

      // ── Capçalera de marca ──────────────────────────────────────────────
      var brand = document.createElement('div');
      brand.className = 'cms-brand';
      brand.innerHTML =
        '<a href="../../" aria-label="Inici — Guies de Barcelona">' +
          '<img src="../../img/Arquitectura-i-urbanisme-de-barcelona.svg" ' +
               'alt="Guies de Barcelona de El Globus Vermell">' +
        '</a>' +
        '<p class="cms-brand-sub">Editor de continguts</p>';
      card.insertBefore(brand, card.firstChild);

      // ── Explicacions sota cada botó ─────────────────────────────────────
      function addInfo(after, html, cls) {
        var p = document.createElement('p');
        p.className = 'cms-login-ajuda' + (cls ? ' ' + cls : '');
        p.innerHTML = html;
        after.parentNode.insertBefore(p, after.nextSibling);
      }

      addInfo(
        githubBtn,
        'No disponible fins que el web sigui en producció (requereix servidor OAuth propi).',
        'cms-login-desactivat'
      );
      addInfo(
        tokenBtn,
        'Mètode actiu. Genera un <strong>token personal (PAT)</strong> a ' +
        '<a href="https://github.com/settings/personal-access-tokens/new" target="_blank" rel="noopener">' +
        'GitHub → Settings → Fine-grained tokens</a>. ' +
        'Permisos: <strong>Contents</strong> (lectura i escriptura) + <strong>Metadata</strong> (lectura). ' +
        'Repositori: <strong>112books/guiesbarcelona-elglobusvermell</strong>.'
      );

      // ── Peu de pàgina ───────────────────────────────────────────────────
      var peu = document.createElement('div');
      peu.className = 'cms-peu';
      peu.innerHTML =
        '<div>© ' + new Date().getFullYear() + ' ' +
        '<a href="https://elglobusvermell.org" target="_blank" rel="noopener">El Globus Vermell</a>' +
        '</div>' +
        '<div class="cms-peu-legal">' +
          '<a href="../../legal/avis-legal/">Avís legal</a>' +
          '<a href="../../legal/privacitat/">Privacitat</a>' +
          '<a href="../../legal/cookies/">Cookies</a>' +
        '</div>' +
        '<a href="../../llicencia/" class="cms-peu-cc" aria-label="Llicència Creative Commons BY-SA 4.0">' +
          '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 42" height="20" aria-hidden="true">' +
            '<rect width="120" height="42" rx="6" fill="#fff" stroke="#ccc" stroke-width="1"/>' +
            '<circle cx="21" cy="21" r="14" fill="#f90"/>' +
            '<text x="21" y="26" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff" font-family="sans-serif">CC</text>' +
            '<circle cx="55" cy="21" r="14" fill="#f90"/>' +
            '<text x="55" y="26" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff" font-family="sans-serif">BY</text>' +
            '<circle cx="89" cy="21" r="14" fill="#f90"/>' +
            '<text x="89" y="26" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff" font-family="sans-serif">SA</text>' +
            '<text x="109" y="26" text-anchor="middle" font-size="10" fill="#555" font-family="sans-serif">4.0</text>' +
          '</svg>' +
        '</a>' +
        '<div class="cms-peu-powered">' +
          'Powered by <a href="https://linuxbcn.com" target="_blank" rel="noopener"><strong>LinuxBCN.com</strong></a>' +
        '</div>' +
        '<div class="cms-peu-back">← <a href="../">Tornar a l\'administrador</a></div>';
      card.appendChild(peu);
    });
    observer.observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
