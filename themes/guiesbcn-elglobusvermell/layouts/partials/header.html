<header class="site-header">
  <a class="site-logo" href="{{ site.Home.Permalink }}" aria-label="{{ site.Title }}">
    {{ if site.Params.logoImg }}
    <img src="{{ site.Params.logoImg | relURL }}" alt="{{ site.Title }}" class="site-logo-img site-logo-full">
    {{ end }}
    {{ if site.Params.logoCompact }}
    <img src="{{ site.Params.logoCompact | relURL }}" alt="{{ site.Title }}" class="site-logo-img site-logo-compact">
    {{ end }}
  </a>
  <nav class="site-nav" aria-label="{{ i18n `nav_label` | default `Navegació principal` }}">
    <ul>
      {{ range site.Menus.main }}
      <li>
        <a href="{{ .URL | absURL }}">
          <span class="nav-label">{{ .Name }}</span>
          <span class="nav-icon" aria-hidden="true">
            {{ if eq .Name "Presentació" }}
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            {{ else if eq .Name "Mapa" }}
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
            {{ else if eq .Name "En paper" }}
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            {{ else if eq .Name "Crèdits" }}
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            {{ end }}
          </span>
        </a>
      </li>
      {{ end }}
    </ul>
  </nav>
</header>
